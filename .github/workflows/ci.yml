name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run backend test suite
        run: pytest

  backend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run backend type checks
        run: mypy

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend coverage tests
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-typecheck, frontend-tests]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Start backend visualizer server
        working-directory: .
        run: |
          PYTHONPATH=src nohup python -m uk_resell_adk.visualizer_server > /tmp/visualizer.log 2>&1 &

      - name: Wait for backend health endpoint
        working-directory: .
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8008/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready in time"
          cat /tmp/visualizer.log || true
          exit 1

      - name: Run Playwright E2E
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
